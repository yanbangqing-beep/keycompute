[package]
name = "client-api"
version = "0.1.0"
edition = "2024"

[dependencies]
# HTTP 客户端（支持 WASM 目标）
# default-features = false 禁用 native TLS（openssl），确保 WASM 可编译
# features: json=JSON支持, rustls-tls=native 环境使用 rustls
reqwest = { version = "0.12", default-features = false, features = ["json"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 时间处理
chrono = { version = "0.4", features = ["serde"] }

# UUID（js feature 为 WASM 目标提供随机数源）
uuid = { version = "1", features = ["v4", "serde", "js"] }

# 错误处理
thiserror = "2"

# 异步延迟（重试退避）： WASM 下使用 gloo-timers， native 下使用 tokio
[target.'cfg(target_arch = "wasm32")'.dependencies]
gloo-timers = { version = "0.3", features = ["futures"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1", features = ["time"] }

[dev-dependencies]
# 仅用于 native 集成测试
tokio = { version = "1", features = ["full"] }
tokio-test = "0.4"
wiremock = "0.6"
